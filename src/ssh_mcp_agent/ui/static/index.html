<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSH MCP Agent | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .code-font { font-family: 'Fira Code', monospace; }
        .scroll-hide::-webkit-scrollbar { display: none; }
        .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#0f172a] text-slate-200 h-screen overflow-hidden flex flex-col">
    <!-- Header -->
    <header class="h-16 border-b border-slate-800 flex items-center justify-between px-6 bg-[#1e293b] shrink-0">
        <div class="flex items-center space-x-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center">
                <i class="fas fa-terminal text-white"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight">SSH MCP <span class="text-blue-500">Agent</span></h1>
        </div>
        <div class="flex items-center space-x-4">
            <div class="flex items-center space-x-2 bg-slate-900 px-3 py-1.5 rounded-full border border-slate-700">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-xs font-medium text-slate-400">Ollama Connected</span>
            </div>
        </div>
    </header>

    <main class="flex-grow flex overflow-hidden">
        <!-- Left Side: Chat -->
        <div class="w-1/2 flex flex-col border-r border-slate-800 bg-[#0f172a]">
            <div id="chat-container" class="flex-grow overflow-y-auto p-6 space-y-6 scroll-hide">
                <div class="flex flex-col items-center justify-center h-full text-slate-500 space-y-4">
                    <i class="fas fa-comments text-4xl opacity-20"></i>
                    <p class="text-sm">Start a conversation with the SSH Agent</p>
                </div>
            </div>
            
            <div class="p-6 bg-[#1e293b] border-t border-slate-800">
                <div class="flex flex-col space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex flex-col space-y-1">
                            <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Model</label>
                            <input type="text" id="model-input" value="llama3.2" class="bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition">
                        </div>
                        <div class="flex flex-col space-y-1">
                            <label class="text-[10px] uppercase font-bold text-slate-500 ml-1">Protocol</label>
                            <select id="format-select" class="bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition">
                                <option value="auto">Auto-detect</option>
                                <option value="native">Native Tooling</option>
                                <option value="json">Legacy JSON</option>
                                <option value="xml">XML Tags</option>
                            </select>
                        </div>
                    </div>
                    <div class="relative">
                        <textarea id="query-input" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 pr-16 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition resize-none" placeholder="Enter command or request..."></textarea>
                        <button id="send-btn" class="absolute bottom-4 right-4 w-10 h-10 bg-blue-600 hover:bg-blue-500 rounded-lg flex items-center justify-center transition shadow-lg">
                            <i class="fas fa-paper-plane text-white"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Side: Logs/Execution -->
        <div class="w-1/2 flex flex-col bg-[#020617]">
            <div class="h-12 border-b border-slate-800 flex items-center justify-between px-4 shrink-0 bg-[#0f172a]">
                <div class="flex items-center space-x-2">
                    <i class="fas fa-microchip text-blue-500 text-xs"></i>
                    <span class="text-[10px] uppercase font-bold tracking-widest text-slate-400">Execution Logs</span>
                </div>
                <button id="clear-logs" class="text-[10px] text-slate-500 hover:text-slate-300 transition">CLEAR</button>
            </div>
            <div id="log-container" class="flex-grow overflow-y-auto p-4 space-y-2 code-font text-xs scroll-hide">
                <div class="text-slate-700 italic">Waiting for tool execution...</div>
            </div>
        </div>
    </main>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const logContainer = document.getElementById('log-container');
        const queryInput = document.getElementById('query-input');
        const modelInput = document.getElementById('model-input');
        const formatSelect = document.getElementById('format-select');
        const sendBtn = document.getElementById('send-btn');
        const clearLogsBtn = document.getElementById('clear-logs');

        function appendChatMessage(role, content) {
            if (chatContainer.querySelector('.text-slate-500')) {
                chatContainer.innerHTML = '';
            }
            
            const isUser = role === 'user';
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;
            
            div.innerHTML = `
                <div class="max-w-[85%] rounded-2xl p-4 ${isUser ? 'bg-blue-600 text-white' : 'bg-slate-800 border border-slate-700 text-slate-200'}">
                    <div class="text-[10px] uppercase font-bold mb-1 ${isUser ? 'text-blue-200' : 'text-slate-500'}">${role}</div>
                    <div class="text-sm whitespace-pre-wrap">${content}</div>
                </div>
            `;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendLog(type, name, data) {
            if (logContainer.querySelector('.italic')) {
                logContainer.innerHTML = '';
            }
            
            const div = document.createElement('div');
            div.className = 'p-2 rounded bg-slate-900 border-l-2 mb-2';
            
            if (type === 'tool_call') {
                div.classList.add('border-blue-500');
                div.innerHTML = `
                    <div class="flex items-center space-x-2 mb-1">
                        <span class="text-blue-400 font-bold">CALL</span>
                        <span class="text-slate-300 font-medium">${name}</span>
                    </div>
                    <pre class="text-[10px] text-slate-500 overflow-x-auto">${JSON.stringify(data, null, 2)}</pre>
                `;
            } else if (type === 'tool_result') {
                div.classList.add('border-green-500');
                div.innerHTML = `
                    <div class="flex items-center space-x-2 mb-1">
                        <span class="text-green-400 font-bold">RESULT</span>
                        <span class="text-slate-300 font-medium">${name}</span>
                    </div>
                    <div class="text-[10px] text-slate-400 whitespace-pre-wrap mt-1 border-t border-slate-800 pt-1">${data}</div>
                `;
            }
            
            logContainer.appendChild(div);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        async function startEventStream() {
            const evSource = new EventSource('/events');
            evSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'tool_call') {
                    appendLog('tool_call', data.name, data.arguments);
                } else if (data.type === 'tool_result') {
                    appendLog('tool_result', data.name, data.content);
                }
            };
        }

        async function sendQuery() {
            const query = queryInput.value.trim();
            if (!query) return;

            appendChatMessage('user', query);
            queryInput.value = '';
            
            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        query, 
                        model: modelInput.value, 
                        format: formatSelect.value 
                    })
                });
                
                // We'll wait for the assistant message via history polling or just assume it comes back
                // For this simple UI, let's poll history every 2 seconds
                pollHistory();
            } catch (err) {
                appendChatMessage('error', 'Failed: ' + err.message);
            }
        }

        let lastHistory = "";
        async function pollHistory() {
            const response = await fetch('/history');
            const data = await response.json();
            
            // Only update if something changed and the last message is from assistant
            const msgs = data.messages;
            if (msgs.length > 0) {
                const lastMsg = msgs[msgs.length - 1];
                if (lastMsg.role === 'assistant' && JSON.stringify(msgs) !== lastHistory) {
                    appendChatMessage('assistant', lastMsg.content);
                    lastHistory = JSON.stringify(msgs);
                }
            }
            
            // If the last message is still 'tool' or 'user', keep polling
            if (msgs.length > 0 && msgs[msgs.length - 1].role !== 'assistant') {
                setTimeout(pollHistory, 1000);
            }
        }

        sendBtn.addEventListener('click', sendQuery);
        queryInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendQuery();
            }
        });
        clearLogsBtn.addEventListener('click', () => {
            logContainer.innerHTML = '<div class="text-slate-700 italic">Logs cleared...</div>';
        });

        startEventStream();
    </script>
</body>
</html>
